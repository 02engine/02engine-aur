name: Get Tag from desktop and Push to AUR

on:
  repository_dispatch:
    types: [updata-aur]

jobs:
  push-to-aur:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update PKGBUILD with pkgver
        run: |
          tag="${{ github.event.client_payload.tag }}"
          if [[ -z "$tag" ]]; then
            echo "错误：dispatch 事件中没有提供 tag"
            exit 1
          fi

          # 移除 v 前缀，得到纯版本号（例如 v1.2.7 → 1.2.7）
          pkgver="${tag#v}"

          echo "原始 tag: $tag"
          echo "pkgver: $pkgver"

          # 只更新 pkgver 行
          sed -i "s|^pkgver=.*|pkgver=$pkgver|" PKGBUILD

          echo "更新后的版本信息："
          grep -E "^(pkgver|pkgrel)=" PKGBUILD || true

      - name: Generate .SRCINFO in Arch container
        run: |
          set -euo pipefail

          docker pull archlinux:base-devel
          docker run --rm \
            -v "$(pwd)":/build \
            -w /build \
            archlinux:base-devel \
            bash -c '
              pacman -Syu --noconfirm &&
              pacman -S --noconfirm git base-devel fakeroot sudo &&
              useradd -m -s /bin/bash builduser &&
              echo "builduser ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers.d/builduser &&
              chown -R builduser:builduser /build &&
              su - builduser -c "cd /build && makepkg --printsrcinfo > .SRCINFO"
            '

          if [ ! -f .SRCINFO ]; then
            echo "错误：.SRCINFO 未生成！"
            ls -la
            exit 1
          fi

          echo ".SRCINFO 生成成功"
          head -n 15 .SRCINFO

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.1
        with:
          pkgname: 02engine-bin
          pkgbuild: ./PKGBUILD
          assets: |
            .SRCINFO
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: Update to ${{ github.event.client_payload.tag }}
          ssh_keyscan_types: rsa,ecdsa,ed25519
          allow_empty_commits: false
