name: Get Tag from desktop and Push to AUR

on:
  repository_dispatch:
    types: [updata-aur]

jobs:
  push-to-aur:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update PKGBUILD with pkgver and sha256
        run: |
          tag="${{ github.event.client_payload.tag }}"
          if [[ -z "$tag" ]]; then
            echo "错误：dispatch 事件中没有提供 tag"
            exit 1
          fi

          # 提取 pkgver（去掉 v 前缀）
          pkgver="${tag#v}"
          deb_url="https://github.com/02engine/desktop/releases/download/v${pkgver}/02Engine-linux-amd64-${pkgver}.deb"

          echo "原始 tag: $tag"
          echo "pkgver: $pkgver"
          echo "deb 下载地址: $deb_url"

          sed -i "s|^pkgver=.*|pkgver=$pkgver|" PKGBUILD

          # 下载 deb 并计算 SHA256
          echo "正在下载 deb 包并计算 SHA256..."
          sha256=$(curl -L -s -f "$deb_url" | sha256sum | awk '{print $1}')

          if [[ -z "$sha256" ]]; then
            echo "错误：无法下载 deb 文件或计算 SHA256"
            exit 1
          fi

          echo "计算得到的 SHA256: $sha256"

          # 替换 sha256sums 中的占位符 DEBSSHA
          sed -i "s|DEBSSHA|$sha256|" PKGBUILD

          echo "PKGBUILD 更新完成"
          echo "更新后的版本信息："
          grep -E "^(pkgver|pkgrel)=" PKGBUILD || true
          echo "sha256sums:"
          grep -E "^sha256sums=" -A 2 PKGBUILD || true

      - name: Generate .SRCINFO in Arch container
        run: |
          set -euo pipefail

          docker pull archlinux:base-devel
          docker run --rm \
            -v "$(pwd)":/build \
            -w /build \
            archlinux:base-devel \
            bash -c '
              pacman -Syu --noconfirm &&
              pacman -S --noconfirm git base-devel fakeroot sudo &&
              useradd -m -s /bin/bash builduser &&
              echo "builduser ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers.d/builduser &&
              chown -R builduser:builduser /build &&
              su - builduser -c "cd /build && makepkg --printsrcinfo > .SRCINFO"
            '

          if [ ! -f .SRCINFO ]; then
            echo "错误：.SRCINFO 未生成！"
            ls -la
            exit 1
          fi

          echo ".SRCINFO 生成成功"
          head -n 20 .SRCINFO

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: 02engine-bin
          pkgbuild: ./PKGBUILD
          assets: |
            .SRCINFO
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: Update to ${{ github.event.client_payload.tag }}
          ssh_keyscan_types: rsa,ecdsa,ed25519
          allow_empty_commits: false
